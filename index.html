<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Vishal Shinde | Software Test Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. VARIABLES --- */
        :root {
            --bg: #030303;
            --tile: rgba(18, 18, 22, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --blue: #3b82f6;
            --green: #2db67c;
            --purple: #a855f7;
            --orange: #f59e0b;
            --red: #ef4444;
            --cyan: #06b6d4;
            --text-muted: #888;
        }

        /* --- 2. RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        .bg-mesh {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.12), transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.12), transparent 40%);
            background-color: var(--bg);
            filter: blur(60px);
            animation: breathe 10s infinite alternate ease-in-out;
        }
        @keyframes breathe { 0% { opacity: 0.7; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }

        /* --- 3. NAVBAR & SOCIALS --- */
        .navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 28px; width: calc(100% - 40px); max-width: 1100px; 
            margin: 20px auto; border: 1px solid var(--border); border-radius: 100px;
            backdrop-filter: blur(20px); background: rgba(255,255,255,0.03);
            position: sticky; top: 20px; z-index: 1000;
            opacity: 0; animation: fadeInUp 1s ease forwards;
        }
        .logo { font-weight: 800; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase; }
        .logo span { color: var(--blue); }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .header-socials { display: flex; gap: 5px; border-right: 1px solid var(--border); padding-right: 15px; }
        .social-link-hdr {
            color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            font-weight: 700; padding: 6px 12px; border-radius: 50px; transition: 0.3s;
        }
        .social-link-hdr:hover { color: #fff; background: rgba(255,255,255,0.1); }

        .contact-btn {
            background: #fff; color: #000; padding: 10px 24px; border-radius: 50px; 
            font-weight: 800; text-decoration: none; font-size: 0.75rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .contact-btn:hover { background: var(--blue); color: #fff; transform: scale(1.05); }

        /* --- 4. BENTO GRID --- */
        .bento-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
            max-width: 1100px; margin: 40px auto; padding: 0 20px;
            grid-template-areas: 
                "hero hero cert"
                "hero hero cert"
                "metrics api cert"
                "arsenal arsenal cert"
                "arsenal arsenal ops";
        }

        .tile {
            background: var(--tile); border: 1px solid var(--border);
            border-radius: 28px; padding: 30px; backdrop-filter: blur(20px);
            opacity: 0; animation: fadeInUp 0.8s forwards;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.4s ease;
            position: relative; z-index: 1;
        }

        .tile:hover { 
            transform: translateY(-8px); 
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .hero { grid-area: hero; animation-delay: 0.1s; }      
        .cert-tile { grid-area: cert; animation-delay: 0.2s; } 
        .metrics-tile { grid-area: metrics; animation-delay: 0.3s; }
        .api-tile { grid-area: api; animation-delay: 0.4s; }
        .arsenal-tile { grid-area: arsenal; animation-delay: 0.5s; }
        .ops-tile { grid-area: ops; animation-delay: 0.6s; }

        /* --- 5. CONTENT STYLES --- */
        h1 { font-size: 3rem; margin: 10px 0; letter-spacing: -1px; }
        h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 15px; letter-spacing: 1px; }

        /* --- 6. CERTS & API (GRADIENT BACKGROUNDS) --- */
        .cert-list { display: flex; flex-direction: column; gap: 12px; }
        .cert { 
            display: flex; flex-direction: column; padding: 14px 18px; border-radius: 16px; 
            border-left: 4px solid transparent; background: rgba(255,255,255,0.03);
            transition: 0.3s ease; gap: 4px; text-decoration: none; color: inherit;
